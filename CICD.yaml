stages:          # List of stages for jobs, and their order of execution
  - Install_tools
  - Test
  - Security
  - Build
  - Docker
  - Deploy
   

Install_mvn_trivy_docker_kubectl:       # This job runs in the build stage, which runs first.
  stage: Install_tools
  script:
    - sudo apt install openjdk-17-jre-headless -y
    - sudo apt install -y maven
    - sudo apt  install -y docker.io && sudo chmod 666 /var/run/docker.sock
    - sudo snap install kubectl --classic
    - sudo apt-get update && sudo apt-get install wget gnupg -y
    - wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
    - echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
    - sudo apt-get update && sudo apt-get install trivy -y
  tags:
    - self-hosted

unit_testing:       # This job runs in the build stage, which runs first.
  stage: Test
  script:
    - mvn test
  tags:
    - self-hosted

Trivy_fs_scan:
  stage: Security
  script:
    - trivy fs --format table -o fs.html .
  tags:
    - self-hosted

sonarqube-check:
  stage: Security
  image: 
    name: sonarsource/sonar-scanner-cli:latest
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - sonar-scanner
  allow_failure: true
  only:
    - main

Build_appliction:
  stage: Build
  script:
    - mvn package
  tags:
    - self-hosted
  only:
    - main

Docker_build_tag_and_push_image:
  stage: Docker
  script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
    - mvn package
    - docker build -t kakkanavar/boardgame-app:latest .
    - docker push kakkanavar/boardgame-app:latest
  tags:
    - self-hosted
  only:
    - main

k8s-deploy:
  stage: Deploy
  variables:
    KUBECONFIG_PATH: /home/ubuntu/.kube/config
  before_script:
    - mkdir -p $(dirname "$KUBECONFIG_PATH")
    - echo "$KUBECONFIG_CONTENT" | base64 -d > "$KUBECONFIG_PATH"
    - export KUBECONFIG="$KUBECONFIG_PATH"
  script:
    - kubectl apply -f deployment-service.yaml
  tags:
    - self-hosted
  only:
    - main
